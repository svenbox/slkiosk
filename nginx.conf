server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── /api/proxy → sl-proxy-containern (avgångar) ──────────
    location /api/proxy {
        proxy_pass http://sl-proxy:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── /api/info  → sl-proxy-containern (GET/PUT info.json) ─
    location /api/info {
        proxy_pass http://sl-proxy:3000/info;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Admin-Password $http_x_admin_password;
        client_max_body_size 1m;
    }

    # ── info.json: no-cache headers ───────────────────────────
    location = /info.json {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # ── Statiska filer ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "ALLOWALL";
    }
}
