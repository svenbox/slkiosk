server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API → proxy-container ─────────────────────────────
    location /api/ {
        proxy_pass http://slkiosk-proxy:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Admin-Password $http_x_admin_password;
        client_max_body_size 5m;
    }

    # ── Admin-sidan ───────────────────────────────────────
    location = /admin {
        return 301 /admin.html;
    }
    location = /admin.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # ── Kiosk-slug: /skarpnacks_frisor → kiosk.html ──────
    # Statiska filer (kiosk.html, admin.html, js, css) servas direkt
    # Allt annat som ser ut som en slug → kiosk.html
    location ~* ^/[a-z0-9_-]+$ {
        try_files $uri /kiosk.html;
        add_header Cache-Control "no-cache";
    }

    # ── Statiska filer ────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "ALLOWALL";
    }
}
