services:
  slkiosk:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slkiosk
    restart: unless-stopped
    ports:
      - "8088:80"
    networks:
      - slkiosk-net
      - mediastack

  slkiosk-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: slkiosk-proxy
    restart: unless-stopped
    environment:
      - TL_API_KEY=${TL_API_KEY}
      - ADMIN_PW=${ADMIN_PW:-kiosk2024}
      - DATA_DIR=/data/kiosks
    volumes:
      - slkiosk-data:/data
    networks:
      - slkiosk-net

volumes:
  slkiosk-data:
    external: true

networks:
  slkiosk-net:
    external: true
  mediastack:
    external: true
